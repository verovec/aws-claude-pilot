service:
  name: myapp-app
  port: 8080
  dockerfile: Dockerfile
  public_path: /

env:
  APP_ENVIRONMENT: development

secrets:
  - rds:
      version: AWSCURRENT
      keys:
        DB_HOST: host
        DB_PORT: port
        DB_NAME: dbname
        DB_USER: username
        DB_PASSWORD: password
  - app:
      version: AWSCURRENT
      keys:
        SECRET_KEY: SECRET_KEY
        DATABASE_URL: DATABASE_URL

resources:
  cpu: 0.5
  memory_gb: 1

scaling:
  min_instances: 1
  max_instances: 10

shutdown:
  strategy: rolling
  stop_timeout_sec: 30

health_check: /health

monitoring:
  dashboard: myapp
  category: api
